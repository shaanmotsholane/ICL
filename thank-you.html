<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | ICL Ministries</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Barlow:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #111111;
      --off-black: #1C1C1C;
      --purple: #3D1278;
      --gold: #C9920A;
      --gold-bright: #F0B429;
      --bg: #FFFFFF;
      --border: #E8E8E8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f9f7ff 0%, #ffffff 100%);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      width: 100%;
      max-width: 700px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(17, 17, 17, 0.08);
      padding: 2.5rem;
      text-align: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--gold));
      color: white;
      font-size: 32px;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-family: 'Barlow', sans-serif;
      font-size: clamp(28px, 4vw, 38px);
      margin-bottom: 1rem;
      color: var(--off-black);
    }
    p {
      font-size: 16px;
      line-height: 1.7;
      color: #555;
      margin-bottom: 1rem;
    }
    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.8rem;
    }
    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: var(--purple);
      color: white;
      box-shadow: 0 10px 20px rgba(61, 18, 120, 0.18);
    }
    .btn-secondary {
      background: #f6f1ff;
      color: var(--purple);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">✓</div>
    <h1>Thank You for Reaching Out</h1>
    <p>Your prayer request or enquiry has been received successfully.</p>
    <p>A member of the church team will get back to you as soon as possible. If this is urgent, please contact the church directly.</p>
    <div class="actions">
      <a href="ICL_Ministries_Website.html" class="btn btn-primary">Back to Home</a>
      <a href="ICL_Ministries_Website.html#contact" class="btn btn-secondary">Contact Church</a>
    </div>
  </div>
</body>
</html>
